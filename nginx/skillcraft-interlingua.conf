# Nginx configuration for SkillCraft-Interlingua
# Domain: skillcraft.interlingua.it

server {
    listen 80;
    listen [::]:80;
    server_name skillcraft.interlingua.it;

    root /var/www/SkillCraft-Interlingua/dist/public;

    access_log /var/log/nginx/skillcraft-interlingua.access.log;
    error_log /var/log/nginx/skillcraft-interlingua.error.log;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
